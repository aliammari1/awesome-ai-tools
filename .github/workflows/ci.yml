name: CI

on:
  pull_request:
    branches:
      - docs
  push:
    branches:
      - docs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: docs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build
